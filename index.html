<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Curated AI art prompts — copy, remix, create.">
  <title>PROMPT GALLERY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">PROMPT GALLERY</a>
      <div class="header-controls">
        <div class="search-wrap">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="search" class="search-input" placeholder="Search prompts..." autocomplete="off">
        </div>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Category Filter Bar -->
  <nav class="filter-bar">
    <div class="filter-bar-inner">
      <button class="filter-btn active" data-category="all">All</button>
      <button class="filter-btn" data-category="portrait">Portrait</button>
      <button class="filter-btn" data-category="landscape">Landscape</button>
      <button class="filter-btn" data-category="abstract">Abstract</button>
      <button class="filter-btn" data-category="product">Product</button>
      <button class="filter-btn" data-category="architecture">Architecture</button>
    </div>
    <div class="filter-bar-inner" style="margin-top: 8px;">
      <span style="color: var(--text-muted); font-size: 0.75rem; margin-right: 4px;">Model:</span>
      <button class="filter-btn model-filter active" data-model="all">All</button>
      <button class="filter-btn model-filter" data-model="Nano Banana">Nano Banana</button>
      <button class="filter-btn model-filter" data-model="ChatGPT Image">ChatGPT</button>
      <button class="filter-btn model-filter" data-model="Midjourney v6">Midjourney</button>
      <button class="filter-btn model-filter" data-model="DALL-E 3">DALL-E 3</button>
    </div>
  </nav>

  <!-- Gallery Grid -->
  <main class="gallery" id="gallery"></main>

  <!-- Empty State -->
  <div class="empty-state" id="empty-state" style="display:none;">
    <p>No prompts found. Try a different search or category.</p>
  </div>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close" aria-label="Close modal">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>

      <div class="modal-image-wrap">
        <img id="modal-image" class="modal-image" src="" alt="">
      </div>

      <div class="modal-body">
        <h2 class="modal-title" id="modal-title"></h2>

        <div class="modal-meta">
          <span class="modal-badge" id="modal-category"></span>
          <span class="modal-model" id="modal-model"></span>
          <span class="modal-ar" id="modal-ar"></span>
        </div>

        <div class="prompt-section">
          <div class="prompt-header">
            <span class="prompt-label">Prompt</span>
            <button class="copy-btn" id="copy-prompt">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
              Copy
            </button>
          </div>
          <pre class="prompt-text" id="modal-prompt"></pre>
        </div>

        <div class="prompt-section">
          <div class="prompt-header">
            <span class="prompt-label">Negative Prompt</span>
            <button class="copy-btn" id="copy-negative">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
              Copy
            </button>
          </div>
          <pre class="prompt-text negative" id="modal-negative"></pre>
        </div>

        <div class="modal-tags" id="modal-tags"></div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">Copied!</div>

  <!-- Footer -->
  <footer class="footer">
    <p>Built with Hermes Agent &bull; 2026</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
